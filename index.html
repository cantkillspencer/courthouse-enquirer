y lens, this was a system in full collapse — Depp's side called it deliberate, Heard's team called it a mischaracterization, and the jury heard both."},{headline:"LITTLE RICHARD",subhead:"March 2015 • Gold Coast, Australia",color:"#CC0000",icon:"🩸",content:"During filming of Pirates of the Caribbean: Dead Men Tell No Tales, a catastrophic fight erupted in their rented Australian home. The tip of Depp's right middle finger was severed. He later named it 'Little Richard.' Both parties agree the finger was severed and that Depp dipped it in paint and wrote obscenities about Heard on the walls, lampshades, and mirrors — some in blood, some in paint when the blood ran out. What they violently disagree on: how the finger was severed. Depp says she hurled a vodka bottle at him. Heard alleges Depp sexually assaulted her with a liquor bottle during the same altercation. Housekeeper Ben King found the missing fingertip in a paper towel near the bar, put it on ice, and handed it to Depp's doctor."},{headline:"PLAY IT BACK",subhead:"The Secret Audio Recordings",color:"#1a237e",icon:"🎙️",content:"Heard secretly recorded dozens of conversations. They became the most explosive evidence of the trial. In one, she admits to hitting Depp while denying she 'punched' him. In another she tells him: 'Tell the world, Johnny. Tell them I, Johnny Depp, am a victim of domestic violence too — and see if people believe you.' In others, Depp is heard vomiting, ranting, and screaming. One clip captured her urging him not to cut himself with a knife. The recordings became a Rorschach test: Depp's fans heard evidence of his victimhood. Heard's supporters heard evidence of his instability."},{headline:"THE PHARMACOPEIA",subhead:"Drugs, Alcohol & A Doctor On Retainer",color:"#4a148c",icon:"💊",content:"Dr. David Kipper, Depp's private addiction physician, traveled the world with him. His alleged cocktail included MDMA, cocaine, Oxycodone, and alcohol — often in combination. In Australia, Heard's lawyers argued he took 8 to 10 MDMA pills the night of their worst fight. Depp responded: 'I'd be dead if I took that many.' Text messages showed him calling himself 'the monster' after substance-fueled incidents. By 2014, Heard was helping him through detox. He texted her mother: 'It was Amber and Amber only that got me through this.' Disney took out an insurance policy on him that detailed his drug and alcohol history in writing. That document was entered into evidence."},{headline:"THE AUSTRALIA PLAYBOOK",subhead:"Both Sides • Zero Agreement",color:"#1b5e20",icon:"✈️",content:"The Australia incident is Ground Zero — every other allegation orbits it. Depp says he spent days drinking and hiding from Heard's anger, locking himself in a bathroom to sober up when she attacked him. Heard says she woke up to him sexually assaulting her, calling her a whore, a slut, and fat. She says he smashed her head against a wall, slammed her into a refrigerator, and dragged her by the hair. Afterward, she found pieces of raw steak wrapped in her torn wedding-gift nightgown scattered through the house. The marriage counselor, Laurel Anderson, testified she saw evidence of 'mutual abuse' — a phrase both sides immediately claimed vindicated their position."}].map(e=>(0,i.jsx)(m,{...e},e.headline)),(0,i.jsxs)("div",{style:{marginTop:24,background:"#f0f4ff",border:"3px solid #1a237e",borderRadius:8,padding:"16px 20px"},children:[(0,i.jsx)(l,{style:{fontSize:18,color:"#1a237e",letterSpacing:1,display:"block",marginBottom:8},children:"🎓 WHAT THE TEXTBOOK SAYS ABOUT ALL THIS"}),(0,i.jsxs)("div",{style:{fontSize:14,lineHeight:1.8,color:"#1a237e"},children:["Cahn & Abigail define a ",(0,i.jsx)("strong",{children:"dysfunctional conflict cycle"})," as one in which parties cannot break free of recurring destructive patterns. Every incident catalogued above represents a loop in that cycle — triggered, escalated, partially resolved, and then triggered again. What makes this case academically remarkable is that both parties documented the cycle themselves: in texts, audio recordings, photo evidence, and eventually sworn courtroom testimony."]})]})]}),3===e&&(0,i.jsxs)("div",{children:[(0,i.jsx)(l,{style:{fontSize:38,color:"#CC0000",letterSpacing:2,display:"block",marginBottom:4},children:"THE 5-STAGE CONFLICT CYCLE"}),(0,i.jsx)("div",{style:{fontSize:14,color:"#555",marginBottom:24,fontStyle:"italic"},children:"Cahn & Abigail's framework, applied to the trial that defined a generation. Click each stage."}),(0,i.jsx)("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:24},children:[{number:1,title:"PRELUDE",color:"#fff3e0",tabloidTag:"🔍 BEFORE THE STORM",content:"They met on the set of The Rum Diary in 2011. Depp was 48, Heard was 25. He was one of Hollywood's biggest stars. She was on her way up. The power imbalance was baked in from day one. His documented substance abuse, her volatility, and their near-obsessive attraction created the pre-existing conditions. Social Exchange Theory tells us both parties entered this exchange calculating profit. Systems Theory says the subsystems were already misaligned — two planets on a collision orbit."},{number:2,title:"TRIGGERING EVENT",color:"#fce4ec",tabloidTag:"💥 THE MATCH THAT LIT THE FIRE",content:"Multiple triggers, not one. The 2013 Palm Springs blowup where Depp punched a bathroom wall. The May 2014 private jet brawl over James Franco. The March 2015 Australia meltdown — a severed fingertip, messages written in blood on the walls, and allegations so disturbing both sides dispute every detail. Then the April 2016 phone incident: Depp allegedly hurled a phone at Heard's face. She obtained a TRO. The exchange had gone from deficit to catastrophic loss for both parties."},{number:3,title:"INITIATION",color:"#e8eaf6",tabloidTag:"📣 GOING PUBLIC",content:"December 2018: Heard publishes her Washington Post op-ed, describing herself as 'a public figure representing domestic abuse' — without naming Depp. He knew the public would know who she meant. He lost Pirates of the Caribbean. He lost Fantastic Beasts. His agent testified he had become 'unemployable.' This is where the private conflict broke into the public system. Depp responded in 2019 with a $50M defamation lawsuit. Game on."},{number:4,title:"DIFFERENTIATION",color:"#e0f7fa",tabloidTag:"⚖️ BOTH SIDES NOW",content:"Six weeks of live trial testimony in 2022, broadcast globally. Depp's team: she's a calculated abuser who manufactured evidence. Heard's team: he's a drug-addled monster who terrorized her. Audio recordings played in open court. Text messages displayed on 80-inch screens. The poop story. The finger. The knife. Two people who once loved each other, presenting evidence to prove the other is the villain — differentiation at its most extreme."},{number:5,title:"RESOLUTION",color:"#f1f8e9",tabloidTag:"🔨 THE GAVEL FALLS",content:"June 1, 2022: Jury awards Depp $10.35M. Heard gets $2M on her counterclaim. Depp wins the public relations war — #JusticeForJohnny had 20B TikTok views. Was it resolution? Systems Theory would say the system is still reverberating — careers altered, public trust in abuse survivors shaken, a global debate about social media and justice still unresolved. The conflict cycle didn't close cleanly. It folded into the next loop."}].map((e,t)=>(0,i.jsx)(g,{...e,isActive:n===t,onClick:()=>r(t)},e.title))}),(0,i.jsxs)("div",{style:{border:"3px solid #1a1a1a",borderRadius:8,overflow:"hidden",boxShadow:"5px 5px 0 #1a1a1a"},children:[(0,i.jsx)("div",{style:{background:"#1a1a1a",padding:"12px 20px"},children:(0,i.jsx)(l,{style:{fontSize:18,color:"#FFD700",letterSpacing:1},children:"THE CYCLE VISUALIZED — DEPP VS. HEARD"})}),(0,i.jsx)("div",{style:{background:"#fffdf5",padding:20,overflowX:"auto"},children:(0,i.jsx)("div",{style:{display:"flex",gap:8,alignItems:"center",minWidth:"max-content"},children:[{e:"🎬",l:"Rum Diary\n2011",c:"#e8f5e9"},{e:"→",l:"",c:"t"},{e:"💍",l:"Married\nFeb 2015",c:"#fff3e0"},{e:"→",l:"",c:"t"},{e:"🩸",l:"Australia\nMar 2015",c:"#ffebee"},{e:"→",l:"",c:"t"},{e:"💩",l:"Bed Incident\nApr 2016",c:"#ffebee"},{e:"→",l:"",c:"t"},{e:"📱",l:"TRO Filed\nMay 2016",c:"#fff3e0"},{e:"→",l:"",c:"t"},{e:"📰",l:"Op-Ed\nDec 2018",c:"#e3f2fd"},{e:"→",l:"",c:"t"},{e:"⚖️",l:"Trial\nApr 2022",c:"#e8eaf6"},{e:"→",l:"",c:"t"},{e:"🔨",l:"Verdict\nJun 2022",c:"#f1f8e9"}].map((e,t)=>"→"===e.e?(0,i.jsx)("div",{style:{fontSize:18,color:"#CC0000",fontWeight:900},children:"→"},t):(0,i.jsxs)("div",{style:{background:e.c,border:"2px solid #1a1a1a",borderRadius:6,padding:"10px 10px",textAlign:"center",flexShrink:0,width:80,boxShadow:"2px 2px 0 #1a1a1a"},children:[(0,i.jsx)("div",{style:{fontSize:20},children:e.e}),(0,i.jsx)(l,{style:{fontSize:9,color:"#1a1a1a",whiteSpace:"pre-line",marginTop:4,display:"block"},children:e.l})]},t))})})]})]}),4===e&&(0,i.jsxs)("div",{children:[(0,i.jsx)(l,{style:{fontSize:38,color:"#CC0000",letterSpacing:2,display:"block",marginBottom:4},children:"THEORY FILES"}),(0,i.jsx)("div",{style:{fontSize:14,color:"#555",marginBottom:20,fontStyle:"italic"},children:"Two academic lenses. One spectacular disaster of a marriage. Click each point to expand."}),(0,i.jsxs)("div",{style:{display:"flex",gap:20,flexWrap:"wrap"},children:[(0,i.jsx)(y,{title:"SOCIAL EXCHANGE THEORY",tagline:"Every relationship is a ledger. When the costs outweigh the rewards — people leave. Or in this case, litigate.",color:"#CC0000",points:[{label:"WHAT IS IT?",text:"Social Exchange Theory, rooted in George Homans' 1958 work, says every relationship is an ongoing economic calculation. People stay when rewards outweigh costs. They leave — or escalate — when the ledger tips negative. Rewards include affection, status, excitement, security. Costs include stress, conflict, fear, and lost opportunities."},{label:"FUNCTIONAL CYCLE",text:"In the early relationship, both were getting more than they gave in costs. He gained energy and a fierce partner. She gained global celebrity access. When they detoxed together, traveled, stayed sober — the exchange was genuinely profitable. Those periods represent the functional cycle: reciprocal exchanges where both parties feel the trade is fair."},{label:"DYSFUNCTIONAL CYCLE",text:"The dysfunctional cycle began when costs accumulated faster than either could manage. Each violent incident depleted trust. Each substance relapse raised the emotional price. Heard's secret recordings are textbook Social Exchange thinking — she was building a ledger, documenting debits. His vile text messages told friends the relationship had gone bankrupt."},{label:"DESTRUCTIVE PROCESS",text:"The op-ed was Heard cashing out the relationship publicly, at maximum cost to Depp. His lawsuit was his response: if she's going to bankrupt me, I'll make her pay the debt in court. The trial itself is Social Exchange Theory in its most destructive form — two parties no longer negotiating a relationship, but litigating its terms of dissolution before the world."}],example:"When Depp texted friends 'I pounded and displayed ugly colors to Amber,' he was documenting a cost he'd inflicted. When Heard secretly recorded their fights, she was building a ledger. Social Exchange Theory explains why people in toxic relationships stay until the exits look more profitable than the status quo — and why, when they finally leave, they often do it explosively."}),(0,i.jsx)(y,{title:"SYSTEMS THEORY",tagline:"A relationship is a system. When one part breaks, everything breaks. This one shattered live on Court TV.",color:"#1a237e",points:[{label:"WHAT IS IT?",text:"Systems Theory views any relationship as an interconnected system with subsystems — the couple, the careers, the social networks, the families, the public personas. When one subsystem malfunctions, it sends shockwaves through all the others. A healthy system seeks equilibrium. A dysfunctional system feeds chaos back into itself, amplifying disruption rather than absorbing it."},{label:"FUNCTIONAL CYCLE",text:"In its functional phase, the Depp-Heard system had built-in stabilizers: Dr. Kipper managing Depp's sobriety, Heard's presence as a calming force during detox, a security staff acting as buffers between their worst moments. These are the system's homeostatic mechanisms — the parts that absorb shock and restore balance."},{label:"DYSFUNCTIONAL CYCLE",text:"The system became dysfunctional when the feedback loops turned negative. Each incident made the next one more likely. Depp's public image decline fed his substance use. His substance use escalated the violence. The violence fed Heard's emotional dysregulation. Her responses escalated the confrontations. When the system has no functioning buffer left — you get Australia. Pure system failure."},{label:"DESTRUCTIVE PROCESS",text:"The trial represents a system that could no longer contain itself internally and burst into the macro-system: courts, media, global public opinion. Twenty billion TikTok views shows how far the disruption propagated outward. The Depp-Heard marital system's collapse became a global cultural subsystem event. Systems Theory would say that kind of propagation is a sign of total internal failure."}],example:"The marriage counselor testified she saw 'mutual abuse.' Systems Theory would predict exactly that: when a system loses its homeostatic mechanisms — sobriety, professional handlers, physical distance — the dysfunctional feedback loop takes over. The trial broadcast is itself a systems event: the internal chaos of one marital system propagating outward until it disrupted a global public discourse."})]}),(0,i.jsxs)("div",{style:{marginTop:24,border:"3px solid #1a1a1a",borderRadius:8,overflow:"hidden",boxShadow:"5px 5px 0 #1a1a1a"},children:[(0,i.jsx)("div",{style:{background:"#FFD700",padding:"12px 20px",borderBottom:"3px solid #1a1a1a"},children:(0,i.jsx)(l,{style:{fontSize:20,color:"#1a1a1a",letterSpacing:1},children:"⚡ WHERE THE TWO THEORIES ALIGN — AND DIVERGE"})}),(0,i.jsxs)("di
